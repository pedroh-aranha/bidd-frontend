<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Editais – Bidding System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="container">
    <div class="page-header">
        <h2>Editais</h2>
        <div class="header-actions">
            <a th:href="@{/editais}" class="btn-secondary" th:classappend="${urgente == null or !urgente} ? ' active' : ''">Todos</a>
            <a th:href="@{/editais(urgente=true)}" class="btn-warning" th:classappend="${urgente} ? ' active' : ''">⚠️ Urgentes (48h)</a>
            <a th:if="${role == 'COMPRADOR'}" th:href="@{/editais/novo}" class="btn-primary">+ Novo Edital</a>
        </div>
    </div>

       <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold mb-0">
            Lista de Editais
        </h2>

        <a th:href="@{/editais/novo}"
           class="btn btn-primary">
            Novo Edital
        </a>

    </div>

    <!-- TABELA -->
    <div class="table-responsive"
         th:if="${!#lists.isEmpty(editais)}">

        <table class="table table-hover align-middle">

            <thead class="table-dark">

                <tr>
                    <th>#</th>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Fechamento</th>
                    <th>Status</th>
                    <th class="text-center">Ação</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="edital : ${editais}">

                    <td th:text="${edital.id}"></td>

                    <td>

                        <div class="fw-semibold"
                             th:text="${edital.titulo}">
                        </div>

                        <span th:if="${edital.urgente != null and edital.urgente}"
                              class="badge bg-danger mt-1">

                            ⚠️ Urgente

                        </span>

                    </td>

                    <td class="text-muted"
                        th:text="${edital.descricao}">
                    </td>

                    <td th:text="${edital.datafechamento}">
                    </td>

                    <td>

                        <span class="badge"
                              th:classappend="${edital.status == 'ABERTO'} 
                              ? ' bg-success' 
                              : ' bg-secondary'"

                              th:text="${edital.status}">
                        </span>

                    </td>

                    <td class="text-center">

                        <a th:href="@{/editais/{id}(id=${edital.id})}"
                           class="btn btn-outline-primary btn-sm">

                            Ver

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>
</main>
</body>
</html>
