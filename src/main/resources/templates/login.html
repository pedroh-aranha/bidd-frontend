<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Login – Bidding System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="card">
    <div class="card-header">
        <div class="logo">🏷️</div>
        <h1>Entrar</h1>
        <p>Acesse sua conta no sistema</p>
    </div>

    <div class="alert alert-success" th:if="${param.cadastro}">
        Cadastro realizado! Faça login para continuar.
    </div>
    <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/login}" th:object="${credentials}" method="post">
        <div class="form-group">
            <label>E-mail <span class="req">*</span></label>
            <input type="email" th:field="*{email}" placeholder="seu@email.com" required/>
        </div>
        <div class="form-group">
            <label>Senha <span class="req">*</span></label>
            <input type="password" th:field="*{senha}" placeholder="Sua senha" required/>
        </div>
        <hr/>
        <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <p class="bottom-link">Não tem conta? <a th:href="@{/register}">Cadastre-se</a></p>
</div>
</body>
</html>
