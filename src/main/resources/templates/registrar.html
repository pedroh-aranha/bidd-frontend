<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastro – Bidding System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body class="bg-light">

<main class="container py-5 d-flex justify-content-center">

    <div class="card shadow border-0 rounded-4"
         style="max-width: 450px; width: 100%;">

        <div class="card-header bg-info text-white text-center rounded-top-4 p-4">

            <div class="logo fs-1">🏷️</div>

            <h1 class="h3 mt-2">Criar Conta</h1>

            <p class="mb-0">
                Preencha os dados para se cadastrar.
            </p>
        </div>

        <div class="card-body p-4">

            <div class="alert alert-danger"
                 th:if="${erro}"
                 th:text="${erro}">
            </div>

            <form th:action="@{/registrar}"
                  th:object="${user}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Nome Completo
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nome}"
                           placeholder="João da Silva"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        E-mail
                    </label>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           placeholder="seu@email.com"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Senha
                    </label>

                    <input type="password"
                           class="form-control"
                           th:field="*{senha}"
                           placeholder="Mínimo 6 caracteres"
                           minlength="6"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Confirmar Senha
                    </label>

                    <input type="password"
                    class="form-control"
                    th:field="*{confirmarSenha}"  
                    placeholder="Digite a senha novamente"
                    minlength="6"
                    required>
                </div>

                <button type="submit"
                        class="btn btn-primary w-100">
                    Cadastrar
                </button>

            </form>

            <div class="text-center mt-4">
                <p class="mb-1">
                    Já possui conta?
                </p>

                <a th:href="@{/logout}" class="btn btn-success">Fazer login</a>
                    
            </div>

        </div>
    </div>

</main>

</body>
</html>
