<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Login – Bidding System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="card">
    <div class="card-header">
        <div class="logo">🏷️</div>
        <h1>Entrar</h1>
        <p>Faça login para continuar.</p>
    </div>

        </div>
        <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>
        
    
        <form th:action="@{/logar}" th:object="${credenciais}" method="post">
            <div class="form-group">
                <label>E-mail <span class="req">  </span></label>
                <input type="email" th:field="*{email}" placeholder="seu@email.com" />
            </div>
            <div class="form-group">
                <label>Senha <span class="req">   </span></label>
                <input type="password" th:field="*{senha}" placeholder="senha" required/>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
            <hr/>
            <li class="nav-item" role="presentation">
                 <p class="bottom-link">Não tem Cadastro! <br><a th:href="@{/registrar}">Cadastre-se</a></p>
              </li>
              
            

</div>
</body>
</html>
