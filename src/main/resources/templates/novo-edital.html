<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

    <head>
        <meta charset="UTF-8"/>
        <title>Novo Edital – Bidding System</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
              rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>

    <body class="bg-light">


        <main class="container py-5">

            <div class="mb-3">
                <a th:href="@{/editais}"
                   class="btn btn-outline-secondary btn-sm">
                    ← Voltar
                </a>

            </div>

            <!-- CARD -->
            <div class="card shadow border-0 rounded-4">

                <!-- HEADER -->
                <div class="card-header bg-dark text-white rounded-top-4 p-4">

                    <h2 class="mb-1 fw-bold">
                        Criar Novo Edital
                    </h2>

                    <p class="mb-0 text-light">
                        Apenas compradores podem criar editais
                    </p>

                </div>

                <div class="card-body p-4">

                    <div class="alert alert-danger"
                         th:if="${erro}"
                         th:text="${erro}">
                    </div>

                    <form th:action="@{/editais/novo}"
                          th:object="${edital}"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Título
                                <span class="text-danger">*</span>

                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{titulo}"
                                   placeholder="Título do edital"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Descrição
                                <span class="text-danger">*</span>

                            </label>

                            <textarea class="form-control"
                                      th:field="*{descricao}"
                                      rows="5"
                                      placeholder="Descreva o edital..."
                                      required>
                            </textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Data de Fechamento
                                <span class="text-danger">*</span>

                            </label>

                            <input type="date"
                                   class="form-control"
                                   th:field="*{datafechamento}"
                                   th:attr="min=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                   required>

                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-primary">

                                Criar Edital

                            </button>

                            <a th:href="@{/editais}"
                               class="btn btn-outline-secondary">

                                Cancelar

                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <div th:replace="~{layout :: footer}"></div>
    </body>
</html>
