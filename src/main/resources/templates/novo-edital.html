<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Novo Edital – Bidding System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{layout :: navbar(${role}, ${nome})}"></div>

<main class="container">
    <a th:href="@{/editais}" class="btn-secondary btn-sm">← Voltar</a>
    <div class="card">
        <div class="card-header">
            <h2>Criar Novo Edital</h2>
            <p>Apenas compradores podem criar editais</p>
        </div>

        <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

        <form th:action="@{/editais/novo}" th:object="${edital}" method="post">
            <div class="form-group">
                <label>Título <span class="req">*</span></label>
                <input type="text" th:field="*{titulo}" placeholder="Título do edital" required/>
            </div>
            <div class="form-group">
                <label>Descrição <span class="req">*</span></label>
                <textarea th:field="*{descricao}" rows="4" placeholder="Descreva o edital..." required></textarea>
            </div>
            <div class="form-group">
                <label>Data de Fechamento <span class="req">*</span></label>
                <input type="date" th:field="*{datafechamento}" required/>
            </div>
            <hr/>
            <button type="submit" class="btn-primary">Criar Edital</button>
        </form>
    </div>
</main>
</body>
</html>
