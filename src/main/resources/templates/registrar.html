<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastro – Bidding System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="card">
    <div class="card-header">
        <div class="logo">🏷️</div>
        <h1>Criar Conta</h1>
        <p>Preencha os dados para se cadastrar</p>
    </div>

    <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/registrar}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Nome completo <span class="req"></span></label>
            <input type="text" th:field="*{nome}" placeholder="João da Silva" required/>
        </div>
        <div class="form-group">
            <label>E-mail <span class="req">       </span></label>
            <input type="email" th:field="*{email}" placeholder="seu@email.com" required/>
        </div>
        <div class="form-group">
            <label>Senha <span class="req">        </span></label>
            <input type="password" th:field="*{senha}" placeholder="Mínimo 6 caracteres" required minlength="6"/>
        </div>
        <br>
        <button type="submit" class="btn-primary">Cadastrar</button>
    </form>      
        <hr/>
        <li class="nav-item" role="presentation">
            <p class="bottom-link">Já tem conta? <br><a th:href="@{/login}">Faça login</a></p>
         </li>
</div>
</body>
</html>
